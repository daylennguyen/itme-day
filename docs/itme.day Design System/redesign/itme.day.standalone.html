  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ns-serif;\n  --font-mono: \"Geist Mono\", ui-monospace, \"SF Mono\", \"Cascadia Code\", Menlo, monospace;\n  --font-fantasy: \"RuneScape UF\", \"Geist\", ui-sans-serif, system-ui, sans-serif;\n  --font-titling: \"OptimusPrinceps\", \"Times New Roman\", Georgia, serif;\n\n  /* ---- BASE palette — DARK (the site default, <html class=\"dark\">) ------ */\n  /* HSL-from-source, resolved to hex for portability. Neutral/zinc ramp.    */\n  --background: #121212;        /* 0 0% 7%   page */\n  --foreground: #fafafa;        /* 0 0% 98%  text */\n  --card: #1a1a1a;              /* 0 0% 10%  surface */\n  --card-foreground: #fafafa;\n  --primary: #fafafa;           /* inverted: light on dark */\n  --primary-foreground: #171717;\n  --secondary: #242424;         /* 0 0% 14%  chips / secondary btn */\n  --secondary-foreground: #fafafa;\n  --muted: #242424;\n  --muted-foreground: #a3a3a3;  /* 0 0% 64%  captions */\n  --accent: #242424;\n  --accent-foreground: #fafafa;\n  --border: #2e2e2e;            /* 0 0% 18% */\n  --input: #2e2e2e;\n  --ring: #d4d4d4;              /* 0 0% 83% */\n  --radius: 0.5rem;\n\n  /* ---- GOBBY goblin mascot earth tones (from gobby.svg) ----------------- */\n  --gobby-skin: #849B49;        /* leafy goblin green (face highlight)  */\n  --gobby-skin-deep: #324D29;   /* shadow green (ears, jaw)             */\n  --gobby-cream: #E6D5B8;       /* portrait ring fill / parchment       */\n  --gobby-ring: #7B5E3D;        /* portrait ring stroke                 */\n  --gobby-shirt: #8B5B33;       /* tunic                                */\n  --gobby-shirt-deep: #523013;  /* tunic shadow                         */\n  --gobby-cap: #4C6F70;         /* teal beanie / hair                   */\n  --gobby-cap-deep: #334E43;    /* face stroke + cap shadow (the \"ink\") */\n\n  /* ---- RNG neon console palette ----------------------------------------- */\n  --rng-bg: #09090b;            /* zinc-950, console backdrop           */\n  --rng-surface: #18181b;       /* zinc-900                             */\n  --rng-surface-2: #27272a;     /* zinc-800                             */\n  --rng-line: #2e2e35;          /* zinc-800/80 borders                  */\n  --rng-text: #d4d4d8;          /* zinc-300 console text                */\n  --rng-muted: #71717a;         /* zinc-500 labels                      */\n\n  --rng-indigo: #6366f1;        /* primary / active                     */\n  --rng-indigo-light: #818cf8;  /* indigo-400 text                      */\n  --rng-indigo-deep: #4f46e5;   /* indigo-600 button base               */\n  --rng-violet: #8b5cf6;        /* d20 / dice accent                    */\n  --rng-violet-light: #a78bfa;\n  --rng-emerald: #10b981;       /* WIN                                  */\n  --rng-emerald-light: #34d399;\n  --rng-rose: #f43f5e;          /* LOSS                                 */\n  --rng-rose-light: #fb7185;\n  --rng-rose-deep: #e11d48;\n  --rng-orange: #fb923c;        /* streak / flame                       */\n\n  /* ---- RuneScape-style chat TEXT-EFFECT palette ------------------------- */\n  /* Colour codes for the goblin/D&D text renderer (see image reference).    */\n  --fx-red: #d83c3c;\n  --fx-purple: #b455c8;\n  --fx-green: #46a832;\n  --fx-cyan: #46c8d2;\n  --fx-yellow: #ecc24e;\n  --fx-white: #ffffff;\n  --fx-orange: #ee8d2c;\n  --fx-pink: #e986b4;\n  --fx-brown: #8a6a46;\n  --fx-blue: #3f6fd6;\n  --fx-grey: #9b9b9b;\n  /* \"inverted\" = transparent fill + light outline (use -webkit-text-stroke) */\n  /* \"rainbow\"  = animated hue cycle (see fx keyframes / .fx-rainbow)        */\n\n  /* Console backdrop glow + chrome shadows */\n  --rng-backdrop:\n    radial-gradient(at 50% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),\n    radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.05) 0, transparent 50%),\n    radial-gradient(at 100% 100%, rgba(225, 29, 72, 0.05) 0, transparent 50%);\n  --rng-shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4);\n  --rng-glow-active: inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 0 10px rgba(99, 102, 241, 0.2);\n}\n\n/* ---- BASE palette — LIGHT (opt-in via :root.light or .light scope) ------ */\n.light {\n  --background: #ffffff;\n  --foreground: #171717;        /* 0 0% 9% */\n  --card: #ffffff;\n  --card-foreground: #171717;\n  --primary: #171717;\n  --primary-foreground: #fafafa;\n  --secondary: #f5f5f5;         /* 0 0% 96% */\n  --secondary-foreground: #171717;\n  --muted: #f5f5f5;\n  --muted-foreground: #737373;  /* 0 0% 45% */\n  --accent: #f5f5f5;\n  --accent-foreground: #171717;\n  --border: #e5e5e5;            /* 0 0% 90% */\n  --input: #e5e5e5;\n  --ring: #171717;\n}\n\n/* ============================================================================\n   SEMANTIC TYPE — Geist scale used across itme.day base surfaces.\n   Tracking is tight on headings, wide on uppercase eyebrows/labels.\n   ============================================================================ */\n\n.eyebrow {                       /* \"itme.day\" / \"RNG\" kicker above titles */\n  font-family: var(--font-sans);\n  font-size: 0.875rem;           /* 14px */\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;         /* tracking-widest */\n  color: var(--muted-foreground);\n}\n\n.h1 {\n  font-family: var(--font-sans);\n  font-size: 1.875rem;           /* 30px — base page title */\n  font-weight: 600;\n  letter-spacing: -0.02em;       /* tracking-tight */\n  line-height: 1.15;\n  color: var(--foreground);\n}\n\n.h2 {\n  font-family: var(--font-sans);\n  font-size: 1.25rem;            /* 20px */\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  line-height: 1.2;\n  color: var(--foreground);\n}\n\n.card-title {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  letter-spacing: -0.01em;\n  line-height: 1;\n  color: var(--card-foreground);\n}\n\n.p {\n  font-family: var(--font-sans);\n  font-size: 1rem;\n  font-weight: 400;\n  line-height: 1.6;\n  color: var(--foreground);\n}\n\n.muted {\n  font-family: var(--font-sans);\n  font-size: 0.875rem;\n  font-weight: 400;\n  line-height: 1.55;\n  color: var(--muted-foreground);\n}\n\n.code, code {\n  font-family: var(--font-mono);\n  font-size: 0.85em;\n  font-weight: 500;\n}\n\n/* ---- RNG \"console\" display type --------------------------------------- */\n.rng-display {                   /* big console hero — RNG PROBABILITY CONSOLE */\n  font-family: var(--font-sans);\n  font-weight: 900;              /* font-black */\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  line-height: 1.0;\n  color: #ffffff;\n}\n\n.rng-label {                     /* tiny stat / control labels */\n  font-family: var(--font-sans);\n  font-size: 0.625rem;           /* 10px */\n  font-weight: 700;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n  color: var(--rng-muted);\n}\n\n.rng-stat {                      /* mono numerals — wins/losses/ratio */\n  font-family: var(--font-mono);\n  font-weight: 900;\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n\n.rng-tab {                       /* nav tab labels */\n  font-family: var(--font-sans);\n  font-size: 0.75rem;\n  font-weight: 900;\n  text-transform: uppercase;\n  letter-spacing: 0.05em;\n}\n\n.fantasy-display {               /* RuneScape UF — goblin/D&D accent voice */\n  font-family: var(--font-fantasy);\n  font-weight: 400;\n  letter-spacing: 0.01em;\n  line-height: 1.1;\n}\n\n.titling {                       /* OptimusPrinceps — regal fantasy titles */\n  font-family: var(--font-titling);\n  font-weight: 400;\n  letter-spacing: 0.02em;\n  line-height: 1.15;\n}\n<\u002Fstyle>\n<script src=\"4a532f9a-2e75-4a57-a79d-71039669c75a\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body {\n    margin: 0; min-height: 100vh; font-family: var(--font-sans);\n    background: var(--background); color: var(--foreground);\n    -webkit-font-smoothing: antialiased;\n    transition: background .4s ease, color .4s ease;\n  }\n  ::selection { background: rgba(132,155,73,0.35); }\n\n  .shell { max-width: 600px; margin: 0 auto; padding: 72px 24px 64px; display: flex; flex-direction: column; gap: 56px; }\n\n  /* ---------- theme toggle ---------- */\n  .theme-toggle {\n    position: fixed; top: 20px; right: 20px; z-index: 20;\n    width: 38px; height: 38px; border-radius: 10px; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    background: var(--secondary); color: var(--muted-foreground);\n    border: 1px solid var(--border); transition: all .2s;\n  }\n  .theme-toggle:hover { color: var(--foreground); border-color: var(--gobby-skin); }\n  .theme-toggle .ico { width: 17px; height: 17px; }\n  .ico svg { width: 100%; height: 100%; display: block; }\n\n  /* ---------- hero ---------- */\n  .hero { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }\n  .mascot { width: 168px; height: 168px; border: none; background: transparent; padding: 0; cursor: pointer; position: relative; }\n  .mascot img { width: 100%; height: 100%; object-fit: contain; user-select: none; animation: bob 4s ease-in-out infinite; }\n  .mascot.pop img { animation: pop .5s cubic-bezier(.3,1.6,.5,1); }\n  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }\n  @keyframes pop { 0% { transform: scale(1); } 35% { transform: scale(.9) rotate(-3deg); } 70% { transform: scale(1.05) rotate(2deg); } 100% { transform: scale(1); } }\n  .mood { height: 16px; font-size: 12px; font-weight: 600; color: var(--gobby-skin); opacity: 0; transform: translateY(-4px); transition: all .2s; }\n  .mood.on { opacity: 1; transform: none; }\n\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em;\n    color: var(--muted-foreground);\n  }\n  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gobby-skin); box-shadow: 0 0 8px rgba(132,155,73,0.7); }\n  .name { font-size: 34px; font-weight: 600; letter-spacing: -0.03em; margin: 2px 0 0; }\n  .intro { color: var(--muted-foreground); font-size: 16px; line-height: 1.6; max-width: 430px; margin: 0; text-wrap: pretty; }\n  .intro .leaf { color: var(--gobby-skin); font-weight: 500; }\n\n  /* ---------- projects ---------- */\n  .section-label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted-foreground); margin-bottom: 18px; }\n  .cards { display: flex; flex-direction: column; gap: 14px; }\n\n  .card {\n    position: relative; display: block; text-decoration: none; color: inherit;\n    border: 1px solid var(--border); background: var(--card); border-radius: 14px;\n    padding: 20px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.3);\n    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;\n  }\n  .card:hover {\n    transform: translateY(-3px);\n    border-color: rgba(132,155,73,0.5);\n    box-shadow: 0 1px 3px rgba(0,0,0,.3), 0 0 20px rgba(132,155,73,0.16);\n  }\n  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }\n  .card-title { font-size: 16.5px; font-weight: 600; letter-spacing: -0.01em; }\n  .card-arrow { color: var(--muted-foreground); transition: transform .25s ease, color .25s ease; flex: none; }\n  .card-arrow .ico { width: 18px; height: 18px; }\n  .card:hover .card-arrow { color: var(--gobby-skin); transform: translate(2px,-2px); }\n  .card-desc { color: var(--muted-foreground); font-size: 14px; line-height: 1.5; margin: 8px 0 0; }\n  .tags { display: flex; gap: 7px; margin-top: 14px; }\n  .tag {\n    font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; letter-spacing: 0.02em;\n    color: var(--muted-foreground); background: var(--secondary);\n    border: 1px solid var(--border); border-radius: 999px; padding: 3px 9px;\n  }\n\n  /* ---------- footer ---------- */\n  .footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; border-top: 1px solid var(--border); padding-top: 24px; }\n  .socials { display: flex; gap: 6px; }\n  .social { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: var(--muted-foreground); border: 1px solid transparent; transition: all .2s; }\n  .social:hover { color: var(--foreground); background: var(--secondary); border-color: var(--border); }\n  .social .ico { width: 16px; height: 16px; }\n  .copy { font-family: var(--font-mono); font-size: 11.5px; color: var(--muted-foreground); }\n\n  @media (max-width: 480px) { .name { font-size: 28px; } .shell { gap: 44px; padding-top: 56px; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  \n\n  <button class=\"theme-toggle\" id=\"themeToggle\" aria-label=\"Toggle light / dark\">\n    <span class=\"ico\"><i data-lucide=\"moon\"><\u002Fi><\u002Fspan>\n  <\u002Fbutton>\n\n  <main class=\"shell\">\n    <!-- hero -->\n    <section class=\"hero\">\n      <button class=\"mascot\" id=\"mascot\" aria-label=\"Gobby — tap him\">\n        <img src=\"7b715a95-3340-4987-8c51-22a46ffd369f\" alt=\"Gobby the goblin\" draggable=\"false\">\n      <\u002Fbutton>\n      <div class=\"mood\" id=\"mood\"><\u002Fdiv>\n      <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan>itme.day<\u002Fspan>\n      <h1 class=\"name\">Daylen Nguyen<\u002Fh1>\n      <p class=\"intro\">Software development engineer building small, useful things. I like clean code, dice, and <span class=\"leaf\">goblins<\u002Fspan>. This is where the things I make live.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- projects -->\n    <section>\n      <div class=\"section-label\">Things I'm building<\u002Fdiv>\n      <div class=\"cards\">\n        <a class=\"card\" href=\"https://gobby.itme.day/\" target=\"_blank\" rel=\"noopener noreferrer\">\n          <div class=\"card-top\">\n            <span class=\"card-title\">Gobby<\u002Fspan>\n            <span class=\"card-arrow\"><span class=\"ico\"><i data-lucide=\"arrow-up-right\"><\u002Fi><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"card-desc\">An AI dungeon master for solo Dungeons &amp; Dragons play — roll, narrate, and adventure on your own.<\u002Fp>\n          <div class=\"tags\"><span class=\"tag\">AI<\u002Fspan><span class=\"tag\">D&amp;D<\u002Fspan><span class=\"tag\">Next.js<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card\" href=\"https://itmedotday.github.io/rng-react-components/\" target=\"_blank\" rel=\"noopener noreferrer\">\n          <div class=\"card-top\">\n            <span class=\"card-title\">rng-react-components<\u002Fspan>\n            <span class=\"card-arrow\"><span class=\"ico\"><i data-lucide=\"arrow-up-right\"><\u002Fi><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"card-desc\">A high-fidelity suite of RNG &amp; gaming UI components for React — dice, coins, wheels, and a D20 roller.<\u002Fp>\n          <div class=\"tags\"><span class=\"tag\">React<\u002Fspan><span class=\"tag\">TypeScript<\u002Fspan><span class=\"tag\">open source<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n\n        <a class=\"card\" href=\"https://itme.day/\" target=\"_blank\" rel=\"noopener noreferrer\">\n          <div class=\"card-top\">\n            <span class=\"card-title\">itme.day<\u002Fspan>\n            <span class=\"card-arrow\"><span class=\"ico\"><i data-lucide=\"arrow-up-right\"><\u002Fi><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"card-desc\">This little hub — a minimal home for the projects I'm tinkering with.<\u002Fp>\n          <div class=\"tags\"><span class=\"tag\">web<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- footer -->\n    <footer class=\"footer\">\n      <div class=\"socials\">\n        <a class=\"social\" href=\"https://github.com/daylennguyen\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"GitHub\"><span class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"currentColor\" width=\"100%\" height=\"100%\"><path d=\"M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.96 0-1.32.47-2.39 1.24-3.23-.13-.3-.54-1.53.11-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.65 1.65.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.23 0 4.63-2.81 5.65-5.49 5.95.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z\"><\u002Fpath><\u002Fsvg><\u002Fspan><\u002Fa>\n        <a class=\"social\" href=\"https://itme.day/\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"Website\"><span class=\"ico\"><i data-lucide=\"globe\"><\u002Fi><\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <span class=\"copy\">© 2026 · made with goblins<\u002Fspan>\n    <\u002Ffooter>\n  <\u002Fmain>\n\n  <script>\n    lucide.createIcons();\n\n    // mascot tap\n    const mascot = document.getElementById('mascot');\n    const mood = document.getElementById('mood');\n    const moods = ['hi.', 'rolling…', 'nat 20!', 'goblin mode', '✦'];\n    let t;\n    mascot.addEventListener('click', () => {\n      mascot.classList.remove('pop'); void mascot.offsetWidth; mascot.classList.add('pop');\n      mood.textContent = moods[Math.floor(Math.random() * moods.length)];\n      mood.classList.add('on');\n      clearTimeout(t); t = setTimeout(() => mood.classList.remove('on'), 1100);\n    });\n\n    // theme toggle (uses .light / .dark token sets from the design system)\n    const root = document.documentElement;\n    const toggle = document.getElementById('themeToggle');\n    const saved = localStorage.getItem('itme-theme');\n    if (saved === 'light') { root.classList.remove('dark'); root.classList.add('light'); }\n    function syncIcon() {\n      const light = root.classList.contains('light');\n      toggle.querySelector('.ico').innerHTML = `<i data-lucide=\"${light ? 'sun' : 'moon'}\"><\u002Fi>`;\n      lucide.createIcons();\n    }\n    syncIcon();\n    toggle.addEventListener('click', () => {\n      const light = root.classList.toggle('light');\n      root.classList.toggle('dark', !light);\n      localStorage.setItem('itme-theme', light ? 'light' : 'dark');\n      syncIcon();\n    });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

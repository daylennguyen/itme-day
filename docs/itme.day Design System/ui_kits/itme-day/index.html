<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>itme.day — UI Kit</title>
<link rel="icon" href="../../assets/gobby.svg">
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; min-height: 100vh; }
  ::selection { background: rgba(99,102,241,0.3); color: #c7d2fe; }

  .page { margin: 0 auto; max-width: 42rem; padding: 64px 24px 80px; display: flex; flex-direction: column; gap: 40px; }

  /* eyebrow/title block */
  .eyebrow { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); }
  .title { font-size: 30px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; margin: 8px 0 0; }
  .subtitle { color: var(--muted-foreground); margin: 8px 0 0; font-size: 15px; line-height: 1.55; }

  /* tab switcher */
  .tabs { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 4px; background: var(--secondary); border-radius: 8px; padding: 4px; }
  .tab { position: relative; height: 38px; border: none; background: transparent; color: var(--muted-foreground); font-family: var(--font-sans); font-size: 14px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: color .2s; }
  .tab:hover { color: var(--foreground); }
  .tab.active { color: var(--foreground); }
  .tab .pill { position: absolute; inset: 0; background: var(--background); border-radius: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.5); transition: transform .35s cubic-bezier(.5,1.4,.5,1); }

  /* hub project cards */
  .card { border: 1px solid var(--border); background: var(--card); border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.35); padding: 24px; display: flex; flex-direction: column; gap: 12px; transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
  .card:hover { transform: translateY(-3px); border-color: rgba(139,92,246,0.45); box-shadow: 0 1px 3px rgba(0,0,0,.35), 0 0 18px rgba(139,92,246,0.18); }
  .card-title { font-weight: 600; letter-spacing: -0.01em; font-size: 16px; }
  .card-desc { font-size: 14px; color: var(--muted-foreground); line-height: 1.5; }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 36px; padding: 0 16px; border-radius: 6px; font-size: 14px; font-weight: 500; border: 1px solid transparent; cursor: pointer; transition: all .15s; font-family: var(--font-sans); }
  .btn-secondary { background: var(--secondary); color: var(--secondary-foreground); box-shadow: 0 1px 2px rgba(0,0,0,.3); }
  .btn-secondary:hover { background: #2e2e2e; }

  .footer { text-align: center; font-size: 12px; color: var(--muted-foreground); border-top: 1px solid var(--border); padding-top: 24px; }
  .footer a { color: var(--foreground); text-decoration: none; }

  /* ---- RNG console host ---- */
  .console-host { background-color: #09090b; background-image: var(--rng-backdrop); border-radius: 16px; padding: 28px 22px; margin: 0 -8px; }
  .ico { display: inline-flex; align-items: center; justify-content: center; }
  .ico svg { width: 100%; height: 100%; display: block; }

  /* ---- TextFX keyframes (RuneScape-style chat effects) ---- */
  @keyframes fxWave { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes fxWave2 { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-13px); } }
  @keyframes fxWave3 { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-9px) rotate(-14deg); } }
  @keyframes fxShake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(1.5px,-1.5px); } 50% { transform: translate(-1.5px,1px); } 75% { transform: translate(1px,1.5px); } }
  @keyframes fxShake2 { 0%,100% { transform: translate(0,0); } 20% { transform: translate(3px,-2px); } 40% { transform: translate(-3px,2px); } 60% { transform: translate(2px,3px); } 80% { transform: translate(-2px,-3px); } }
  @keyframes fxRainbow { 0% { color:#e34b4b; } 16% { color:#ee8d2c; } 33% { color:#ecc24e; } 50% { color:#46a832; } 66% { color:#46c8d2; } 83% { color:#3f6fd6; } 100% { color:#b455c8; } }
  @keyframes fxGlow { 0%,100% { text-shadow: 0 0 2px var(--glow); } 50% { text-shadow: 0 0 14px var(--glow), 0 0 24px var(--glow); } }
  @keyframes fxFlash { 0%,49% { opacity: 1; } 50%,100% { opacity: 0.18; } }
  @keyframes fxScrollL { 0% { transform: translateX(105%); } 100% { transform: translateX(-105%); } }
  @keyframes fxScrollR { 0% { transform: translateX(-105%); } 100% { transform: translateX(105%); } }
  @keyframes fxSlideD { 0% { transform: translateY(-130%); } 42%,58% { transform: translateY(0); } 100% { transform: translateY(130%); } }
  @keyframes fxSlideU { 0% { transform: translateY(130%); } 42%,58% { transform: translateY(0); } 100% { transform: translateY(-130%); } }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="GobbyMascot.jsx"></script>
  <script type="text/babel" src="HubHome.jsx"></script>
  <script type="text/babel" src="RngGames.jsx"></script>
  <script type="text/babel" src="TextFX.jsx"></script>
  <script type="text/babel" src="D20Console.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

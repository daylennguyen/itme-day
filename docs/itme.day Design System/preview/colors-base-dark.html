<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 56px; border-radius: 8px; border: 1px solid var(--border); }
  .nm { font-size: 11px; font-weight: 600; letter-spacing: -0.01em; }
  .hx { font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:#121212"></div><span class="nm">background</span><span class="hx">#121212</span></div>
      <div class="sw"><div class="chip" style="background:#1a1a1a"></div><span class="nm">card</span><span class="hx">#1a1a1a</span></div>
      <div class="sw"><div class="chip" style="background:#242424"></div><span class="nm">secondary</span><span class="hx">#242424</span></div>
      <div class="sw"><div class="chip" style="background:#2e2e2e"></div><span class="nm">border</span><span class="hx">#2e2e2e</span></div>
      <div class="sw"><div class="chip" style="background:#a3a3a3"></div><span class="nm">muted-fg</span><span class="hx">#a3a3a3</span></div>
      <div class="sw"><div class="chip" style="background:#fafafa"></div><span class="nm">foreground</span><span class="hx">#fafafa</span></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 28px 30px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .btn { display:inline-flex; align-items:center; gap:8px; height:36px; padding:0 16px; border-radius:6px; font-size:14px; font-weight:500; border:1px solid transparent; cursor:pointer; transition:all .15s; }
  .default { background:#fafafa; color:#171717; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .secondary { background:#242424; color:#fafafa; box-shadow:0 1px 2px rgba(0,0,0,.3); }
  .outline { background:transparent; color:#fafafa; border-color:#2e2e2e; }
  .ghost { background:transparent; color:#fafafa; }
  .ghost:hover, .outline:hover { background:#242424; }
  .link { background:transparent; color:#fafafa; text-decoration:underline; text-underline-offset:4px; padding:0 4px; }
</style>
</head>
<body>
  <div class="wrap">
    <button class="btn default">Visit</button>
    <button class="btn secondary">Visit</button>
    <button class="btn outline">Outline</button>
    <button class="btn ghost">Ghost</button>
    <button class="btn link">Link</button>
  </div>
</body>
</html>

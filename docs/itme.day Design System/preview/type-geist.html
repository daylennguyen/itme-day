<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 26px 30px; display: flex; flex-direction: column; gap: 14px; }
  .eyebrow { }
  .big { font-size: 44px; font-weight: 600; letter-spacing: -0.025em; line-height: 1; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted-foreground); }
  .scale { display: flex; align-items: baseline; gap: 16px; }
  .scale span:first-child { width: 58px; font-family: var(--font-mono); font-size: 10px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Geist · Sans</div>
    <div class="big">Things I am building.</div>
    <div class="scale"><span>900</span><span style="font-weight:900;font-size:20px">Black — console headlines</span></div>
    <div class="scale"><span>600</span><span style="font-weight:600;font-size:20px">Semibold — titles</span></div>
    <div class="scale"><span>500</span><span style="font-weight:500;font-size:20px">Medium — eyebrows / buttons</span></div>
    <div class="scale"><span>400</span><span style="font-weight:400;font-size:20px">Regular — body copy</span></div>
    <div class="meta">aA bB · 0123456789 · the quick goblin rolls a nat 20</div>
  </div>
</body>
</html>

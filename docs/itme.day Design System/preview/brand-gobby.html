<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 22px 30px; display:flex; align-items:center; gap:28px; }
  .mascot { width:150px; height:150px; flex:none; }
  .mascot img { width:100%; height:100%; object-fit:contain; }
  .txt { display:flex; flex-direction:column; gap:8px; }
  .name { font-size:24px; font-weight:700; letter-spacing:-0.02em; color:var(--gobby-skin); }
  .desc { font-size:13px; color:var(--muted-foreground); line-height:1.55; max-width:340px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--muted-foreground); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mascot"><img src="../assets/gobby.svg" alt="Gobby the goblin mascot"></div>
    <div class="txt">
      <div class="name">Gobby</div>
      <div class="desc">The brand heart — a cute goblin bust on a parchment disc. In-app, his face (eyes, brows, mouth) is animated and tappable; the SVG holds the body.</div>
      <div class="tag">assets/gobby.svg · 2048×2048</div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 24px 30px; }
  .card { max-width: 380px; border:1px solid var(--border); background:var(--card); border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.4); padding:24px; display:flex; flex-direction:column; gap:12px; }
  .title { font-weight:600; letter-spacing:-0.01em; font-size:16px; }
  .desc { font-size:14px; color:var(--muted-foreground); line-height:1.5; }
  .btn { align-self:flex-start; display:inline-flex; align-items:center; height:36px; padding:0 16px; border-radius:6px; font-size:14px; font-weight:500; background:#242424; color:#fafafa; box-shadow:0 1px 2px rgba(0,0,0,.3); border:none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="title">Gobby</div>
      <div class="desc">AI dungeon master for solo D&amp;D play.</div>
      <button class="btn">Visit</button>
    </div>
  </div>
</body>
</html>

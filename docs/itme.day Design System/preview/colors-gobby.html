<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #1a1a1a; color: #fafafa; }
  .wrap { padding: 24px 28px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 56px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
  .nm { font-size: 10.5px; font-weight: 600; letter-spacing: -0.01em; }
  .hx { font-family: var(--font-mono); font-size: 9.5px; color: #a3a3a3; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:#849B49"></div><span class="nm">skin</span><span class="hx">#849B49</span></div>
      <div class="sw"><div class="chip" style="background:#324D29"></div><span class="nm">skin deep</span><span class="hx">#324D29</span></div>
      <div class="sw"><div class="chip" style="background:#E6D5B8"></div><span class="nm">cream</span><span class="hx">#E6D5B8</span></div>
      <div class="sw"><div class="chip" style="background:#7B5E3D"></div><span class="nm">ring</span><span class="hx">#7B5E3D</span></div>
      <div class="sw"><div class="chip" style="background:#8B5B33"></div><span class="nm">tunic</span><span class="hx">#8B5B33</span></div>
      <div class="sw"><div class="chip" style="background:#4C6F70"></div><span class="nm">cap</span><span class="hx">#4C6F70</span></div>
      <div class="sw"><div class="chip" style="background:#334E43"></div><span class="nm">ink</span><span class="hx">#334E43</span></div>
    </div>
  </div>
</body>
</html>

<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 24px 30px; display: flex; flex-direction: column; gap: 18px; }
  .block { display: flex; flex-direction: column; gap: 7px; }
  .lab { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted-foreground); }
  .titling { font-family: var(--font-titling); font-size: 34px; color: var(--gobby-cream); }
  .fantasy { font-family: var(--font-fantasy); font-size: 30px; color: var(--gobby-skin); }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted-foreground); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="block">
      <span class="lab">OptimusPrinceps · titling serif</span>
      <span class="titling">The Goblin's Dungeon</span>
      <span class="meta">var(--font-titling) · self-hosted · regal fantasy headings</span>
    </div>
    <div class="block">
      <span class="lab">RuneScape UF · pixel display</span>
      <span class="fantasy">You roll a nat 20! &mdash; 0123456789</span>
      <span class="meta">var(--font-fantasy) · self-hosted · goblin/D&amp;D accent</span>
    </div>
  </div>
</body>
</html>

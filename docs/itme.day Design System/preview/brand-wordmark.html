<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background); color: var(--foreground); }
  .wrap { padding: 28px 30px; display:flex; flex-direction:column; gap:18px; }
  .lockup { display:flex; align-items:center; gap:14px; }
  .lockup img { width:46px; height:46px; }
  .word { font-size:30px; font-weight:600; letter-spacing:-0.03em; }
  .word b { font-weight:700; }
  .eyebrow { }
  .row { display:flex; gap:24px; align-items:center; }
  .dim { color:var(--muted-foreground); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <img src="../assets/gobby.svg" alt="">
      <span class="word">itme<b>.day</b></span>
    </div>
    <div class="row">
      <span class="eyebrow">itme.day</span>
      <span class="dim" style="font-size:13px">— uppercase, wide-tracked eyebrow / section tag</span>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background:#09090b; background-image:var(--rng-backdrop); color:#d4d4d8; }
  .wrap { padding: 22px 30px; display:flex; align-items:center; gap:28px; }
  .die { width:120px; height:120px; flex:none; filter: drop-shadow(0 0 24px rgba(139,92,246,0.45)); }
  .die img { width:100%; height:100%; object-fit:contain; }
  .txt { display:flex; flex-direction:column; gap:8px; }
  .name { font-size:22px; font-weight:900; letter-spacing:-0.02em; color:#a78bfa; text-transform:uppercase; }
  .desc { font-size:13px; color:#71717a; line-height:1.55; max-width:330px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:#52525b; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="die"><img src="../assets/d20.svg" alt="D20 icosahedron emblem"></div>
    <div class="txt">
      <div class="name">D20 Emblem</div>
      <div class="desc">The mark of the RNG / console world — a faceted violet icosahedron. Gradient triangles, indigo edges, soft outer glow.</div>
      <div class="tag">assets/d20.svg · 200×200</div>
    </div>
  </div>
</body>
</html>

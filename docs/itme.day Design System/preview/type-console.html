<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background:#09090b; background-image: var(--rng-backdrop); color:#fff; }
  .wrap { padding: 30px; display:flex; flex-direction:column; gap:14px; align-items:center; text-align:center; }
  .badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; background:rgba(24,24,27,0.8); border:1px solid #27272a; font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#818cf8; }
  .display { font-size:40px; font-weight:900; letter-spacing:-0.025em; text-transform:uppercase; line-height:1; }
  .grad { background:linear-gradient(90deg,#818cf8,#4f46e5); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { font-size:13px; color:#71717a; max-width:380px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">Provably Fair Mechanics</div>
    <div class="display">RNG PROBABILITY <span class="grad">CONSOLE</span></div>
    <div class="sub">font-black · uppercase · tight tracking — the console display voice</div>
  </div>
</body>
</html>
